# Fresh, self-contained environment (deliberately NOT named
# "improved-diffusion" to avoid colliding with any pre-existing env).
# torch is installed via pip so the current CUDA wheels (Blackwell-capable)
# are used.
name: calo-ddpm
channels:
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - -r requirements.txt
